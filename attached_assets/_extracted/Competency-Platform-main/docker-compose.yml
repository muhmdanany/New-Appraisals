services:
  postgres:
    image: postgres:16-alpine
    container_name: competency_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: competency
      POSTGRES_PASSWORD: competency_dev_pw
      POSTGRES_DB: competency
    ports:
      - "5432:5432"
    volumes:
      - competency_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U competency -d competency"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  competency_pgdata:
