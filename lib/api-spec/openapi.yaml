openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Competency Platform REST API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: departments
  - name: dashboard
  - name: competencies
  - name: grades
  - name: jobs
  - name: employees
  - name: kpis
  - name: career-paths
  - name: evaluations
  - name: reports
paths:
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: قائمة المستخدمين المتاحين لاختيار الهوية
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /departments:
    get:
      operationId: listDepartments
      tags: [departments]
      responses:
        "200":
          description: Departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"

  /dashboard/stats:
    get:
      operationId: dashboardStats
      tags: [dashboard]
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"
  /dashboard/analytics:
    get:
      operationId: dashboardAnalytics
      tags: [dashboard]
      responses:
        "200":
          description: Analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardAnalytics"

  /competencies:
    get:
      operationId: listCompetencies
      tags: [competencies]
      parameters:
        - { name: search, in: query, schema: { type: string } }
        - { name: type, in: query, schema: { type: string } }
        - { name: take, in: query, schema: { type: integer } }
        - { name: skip, in: query, schema: { type: integer } }
      responses:
        "200":
          description: Competencies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Competency"
    post:
      operationId: createCompetency
      tags: [competencies]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompetencyInput"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Competency"
  /competencies/options:
    get:
      operationId: competencyOptions
      tags: [competencies]
      responses:
        "200":
          description: Options
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CompetencyOption"
  /competencies/{id}:
    put:
      operationId: updateCompetency
      tags: [competencies]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompetencyInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Competency"
    delete:
      operationId: deleteCompetency
      tags: [competencies]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /competencies/generate:
    post:
      operationId: generateCompetencies
      tags: [competencies]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateCompetenciesInput"
      responses:
        "200":
          description: Generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedCompetencies"
  /competencies/import:
    post:
      operationId: importCompetencies
      tags: [competencies]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompetencyImportInput"
      responses:
        "200":
          description: Imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"

  /grades:
    get:
      operationId: listGrades
      tags: [grades]
      responses:
        "200":
          description: Grades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Grade"
    post:
      operationId: createGrade
      tags: [grades]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GradeInput"
      responses:
        "200":
          description: Created
          content:
            application/json:
