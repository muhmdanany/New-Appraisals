  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
      parameters:
        - { name: search, in: query, schema: { type: string } }
      responses:
        "200":
          description: Employees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"
    post:
      operationId: createEmployee
      tags: [employees]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeInput"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
  /employees/{id}:
    put:
      operationId: updateEmployee
      tags: [employees]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /kpis:
    get:
      operationId: listKpis
      tags: [kpis]
      responses:
        "200":
          description: KPI summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KpiSummary"
  /kpis/{jobId}:
    get:
      operationId: getKpiSet
      tags: [kpis]
      parameters:
        - { name: jobId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: KPI set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KpiSet"
    put:
      operationId: saveKpiSet
      tags: [kpis]
      parameters:
        - { name: jobId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KpiSetInput"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KpiSet"
  /kpis/{jobId}/generate:
    post:
      operationId: generateKpis
      tags: [kpis]
      parameters:
        - { name: jobId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedKpis"

  /career-paths:
    get:
      operationId: listCareerPaths
      tags: [career-paths]
      responses:
        "200":
          description: Career paths
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CareerPath"
    post:
      operationId: createCareerPath
      tags: [career-paths]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CareerPathInput"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareerPath"
  /career-paths/{id}:
    put:
      operationId: updateCareerPath
      tags: [career-paths]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CareerPathInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareerPath"
  /career-paths/generate:
    post:
      operationId: generateCareerPath
      tags: [career-paths]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateCareerPathInput"
      responses:
        "200":
          description: Generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedCareerPath"

  /evaluations:
    get:
      operationId: listEvaluations
      tags: [evaluations]
      parameters:
        - { name: status, in: query, schema: { type: string } }
      responses:
        "200":
          description: Evaluations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Evaluation"
    post:
      operationId: createEvaluation
      tags: [evaluations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluationInput"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponse"
  /evaluations/form-data:
    get:
      operationId: evaluationFormData
      tags: [evaluations]
      parameters:
        - { name: employeeId, in: query, required: true, schema: { type: string } }
      responses:
        "200":
          description: Form data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluationFormData"
  /evaluations/department-distribution:
    get:
      operationId: departmentDistribution
      tags: [evaluations]
      parameters:
        - { name: employeeId, in: query, required: true, schema: { type: string } }
        - { name: period, in: query, schema: { type: string } }
        - { name: excludeEvaluationId, in: query, schema: { type: string } }
      responses:
        "200":
          description: Distribution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepartmentDistribution"
  /evaluations/{id}:
    get:
      operationId: getEvaluation
      tags: [evaluations]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Evaluation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Evaluation"
    put:
      operationId: updateEvaluation
      tags: [evaluations]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluationUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponse"
  /evaluations/{id}/submit:
    post:
      operationId: submitEvaluation
      tags: [evaluations]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluationStatusResponse"
  /evaluations/{id}/approve:
    post:
      operationId: approveEvaluation
      tags: [evaluations]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluationStatusResponse"
  /evaluations/{id}/reject:
    post:
      operationId: rejectEvaluation
      tags: [evaluations]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectInput"
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluationStatusResponse"
  /evaluations/{id}/acknowledge:
    post:
      operationId: acknowledgeEvaluation
      tags: [evaluations]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluationStatusResponse"
  /evaluations/{id}/object:
    post:
      operationId: objectEvaluation
      tags: [evaluations]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ObjectionInput"
      responses:
        "200":
          description: Objected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluationStatusResponse"

  /reports/evaluations:
    get:
      operationId: reportEvaluations
      tags: [reports]
      responses:
        "200":
          description: Report rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReportEvaluationRow"
  /reports/bell-curve:
    get:
      operationId: reportBellCurve
      tags: [reports]
      responses:
        "200":
          description: Bell curve
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BellCurveReport"
  /reports/org-tree:
    get:
      operationId: reportOrgTree
      tags: [reports]
      responses:
        "200":
          description: Org tree
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrgTreeNode"

components:
  schemas:
    User:
      type: object
      required: [id, email, name, role, isActive]
      properties:
        id: { type: string }
        email: { type: string }
        name: { type: string }
        role:
          type: string
          enum: [ADMIN, HR_MANAGER, FIRST_LEVEL_MANAGER, SECOND_LEVEL_MANAGER, EMPLOYEE]
        isActive: { type: boolean }
        employeeId: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]
    OkResponse:
      type: object
      properties:
        ok: { type: boolean }
      required: [ok]
    IdResponse:
      type: object
      properties:
        id: { type: string }
      required: [id]
    ImportResult:
      type: object
      properties:
        imported: { type: integer }
      required: [imported]
    EvaluationStatusResponse:
      type: object
      properties:
        id: { type: string }
        status: { type: string }
      required: [id, status]

    Department:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        level: { type: string }
        parentId: { type: ["string", "null"] }
      required: [id, name, level]

    DashboardStats:
      type: object
      properties:
        jobs: { type: integer }
        competencies: { type: integer }
        grades: { type: integer }
        evaluations: { type: integer }
        employees: { type: integer }
        kpis: { type: integer }
        careerPaths: { type: integer }
        departments: { type: integer }
      required: [jobs, competencies, grades, evaluations, employees, kpis, careerPaths, departments]
    RatingDistributionItem:
      type: object
      properties:
        label: { type: string }
        count: { type: integer }
      required: [label, count]
    DashboardAnalytics:
      type: object
      properties:
        finalizedCount: { type: integer }
        averageScore: { type: number }
        ratingDistribution:
          type: array
          items:
            $ref: "#/components/schemas/RatingDistributionItem"
        activePolicyName: { type: ["string", "null"] }
      required: [finalizedCount, averageScore, ratingDistribution]

    Competency:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        type: { type: string }
        level: { type: string }
        description: { type: ["string", "null"] }
        indicators: { type: ["string", "null"] }
        isShared: { type: boolean }
        sharedKey: { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: string }
      required: [id, name, type, level, isShared]
    CompetencyOption:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        type: { type: string }
      required: [id, name, type]
    CompetencyInput:
      type: object
      properties:
        name: { type: string }
        type: { type: string }
        level: { type: string }
        description: { type: string }
        indicators: { type: string }
      required: [name, type]
    GenerateCompetenciesInput:
      type: object
      properties:
        jobId: { type: string }
      required: [jobId]
    GeneratedCompetencyItem:
      type: object
      properties:
        name: { type: string }
        type: { type: string }
        level: { type: string }
        description: { type: string }
        indicators: { type: string }
      required: [name, type]
    GeneratedCompetencies:
      type: object
      properties:
        competencies:
          type: array
          items:
            $ref: "#/components/schemas/GeneratedCompetencyItem"
      required: [competencies]
    CompetencyImportInput:
      type: object
      properties:
        rows:
          type: array
          items:
            $ref: "#/components/schemas/CompetencyInput"
      required: [rows]

    GradeLevel:
      type: object
      properties:
        id: { type: string }
        gradeId: { type: string }
        level: { type: integer }
        label: { type: string }
        minScore: { type: integer }
        stayYears: { type: integer }
        minYrsSecondary: { type: integer }
        minYrsDiploma: { type: integer }
        minYrsBachelor: { type: integer }
        minYrsMaster: { type: integer }
        minYrsPhd: { type: integer }
        competencies: { type: ["string", "null"] }
      required: [id, gradeId, level, label]
    Grade:
      type: object
      properties:
        id: { type: string }
        num: { type: string }
        name: { type: string }
        classification: { type: ["string", "null"] }
        leaveDays: { type: integer }
        salaryMin: { type: ["number", "null"] }
        salaryMax: { type: ["number", "null"] }
        housing: { type: ["string", "null"] }
        transport: { type: ["string", "null"] }
        bonus: { type: ["string", "null"] }
        benefits: { type: ["string", "null"] }
        levels:
          type: array
          items:
            $ref: "#/components/schemas/GradeLevel"
      required: [id, num, name]
    GradeLevelInput:
      type: object
      properties:
        level: { type: integer }
        label: { type: string }
        minScore: { type: ["integer", "null"] }
        stayYears: { type: ["integer", "null"] }
        minYrsSecondary: { type: ["integer", "null"] }
        minYrsDiploma: { type: ["integer", "null"] }
        minYrsBachelor: { type: ["integer", "null"] }
        minYrsMaster: { type: ["integer", "null"] }
        minYrsPhd: { type: ["integer", "null"] }
        competencies: { type: ["string", "null"] }
      required: [level, label]
    GradeInput:
      type: object
      properties:
        num: { type: string }
        name: { type: string }
        classification: { type: ["string", "null"] }
        leaveDays: { type: ["integer", "null"] }
        salaryMin: { type: ["number", "null"] }
        salaryMax: { type: ["number", "null"] }
        housing: { type: ["string", "null"] }
        transport: { type: ["string", "null"] }
        bonus: { type: ["string", "null"] }
        benefits: { type: ["string", "null"] }
        levels:
          type: array
          items:
            $ref: "#/components/schemas/GradeLevelInput"
      required: [num, name]
    GradeImportInput:
      type: object
      properties:
        rows:
          type: array
          items:
            $ref: "#/components/schemas/GradeInput"
      required: [rows]

    Job:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: ["string", "null"] }
        contractType: { type: ["string", "null"] }
        experienceLevel: { type: ["string", "null"] }
        departmentId: { type: ["string", "null"] }
        gradeId: { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: string }
        departmentName: { type: ["string", "null"] }
        gradeName: { type: ["string", "null"] }
        competencyIds:
          type: array
          items: { type: string }
        competencyCount: { type: integer }
      required: [id, name]
    JobInput:
      type: object
      properties:
        name: { type: string }
        description: { type: ["string", "null"] }
        contractType: { type: string }
